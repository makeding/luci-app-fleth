---
name: Build package for luci-app-fleth

on:
  push:
    branches:
      - test-ci
jobs:
  build:
    name: Generic build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64
          PACKAGES: luci-app-fleth
          FEEDNAME: huggy
      - name: ls
        run: ls bin/packages/x86_64/huggy/